services:
  api:
    build:
      dockerfile: apps/queue-system/Dockerfile
      context: ../..
      # Only build the development stage for local use.
      target: development
    volumes:
      - .:/workspace/apps/queue-system
      - /workspace/apps/queue-system/node_modules
    env_file:
      - .env
    command: pnpm dev
    ports:
      - 3000:3000
    depends_on:
      - redis
  redis:
    image: redis
    ports:
      - 6379:6379
    volumes:
      - redis:/data
volumes:
  redis:
    driver: local

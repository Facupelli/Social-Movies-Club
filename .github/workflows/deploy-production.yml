name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: social-movies-club-production
  queue: max

jobs:
  deploy:
    name: Migrate and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Drizzle migrations
        run: pnpm --dir apps/web run db:check

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production configuration
        working-directory: apps/web
        run: >
          vercel pull
          --yes
          --environment=production
          --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production deployment
        working-directory: apps/web
        run: >
          vercel build
          --prod
          --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Migrate production database
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: pnpm run db:migrate

      - name: Deploy production build
        id: deploy
        working-directory: apps/web
        run: |
          DEPLOYMENT_URL="$(
            vercel deploy \
              --prebuilt \
              --prod \
              --token="${{ secrets.VERCEL_TOKEN }}"
          )"

          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "### Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
